<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HomeCast</title>

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: '#0a0a0a',
            card:    '#111111',
            'card-hover': '#1a1a1a',
            accent:  '#22d3ee',
            accent2: '#06b6d4',
            danger:  '#ef4444',
            success: '#22c55e',
          }
        }
      }
    }
  </script>

  <!-- PeerJS CDN -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <style>
    body { background: #000; }

    /* Fix the height to the actual visible viewport on mobile */
    html, body { height: 100%; overflow: hidden; }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: .35; }
    }
    .animate-pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in { animation: fade-in .35s ease-out both; }

    @keyframes glow-ring {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); }
      50%      { box-shadow: 0 0 0 6px rgba(34, 211, 238, .12); }
    }
    .animate-glow { animation: glow-ring 2.5s ease-in-out infinite; }

    /* Elapsed-time ticker */
    .timer-mono { font-variant-numeric: tabular-nums; }

    /* Video container: fills space, never overflows */
    .video-frame { position: relative; border-radius: 1rem; overflow: hidden; background: #000; }
    .video-frame video { width: 100%; height: 100%; object-fit: contain; display: block; }

    /* Floating controls over video */
    .video-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: space-between; pointer-events: none; }
    .video-overlay > * { pointer-events: auto; }

    /* Fullscreen: fill everything */
    .video-frame:fullscreen,
    .video-frame:-webkit-full-screen { border-radius: 0; width: 100vw; height: 100vh; }
  </style>
</head>

<body class="h-full bg-surface text-white font-sans antialiased select-none dark">

  <!-- ======================== HOME SCREEN ======================== -->
  <div id="screen-home" class="flex flex-col items-center justify-center h-full px-6 gap-6 animate-fade-in">
    <!-- Logo -->
    <div class="text-center mb-2">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-accent/10 mb-4">
        <svg class="w-8 h-8 text-accent" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M2.25 12l8.954-8.955a1.126 1.126 0 011.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
      </div>
      <h1 class="text-3xl font-bold tracking-wider text-accent">HomeCast</h1>
      <p class="text-zinc-500 text-xs mt-1.5 tracking-wide">Secure local network CCTV</p>
    </div>

    <!-- Mode cards -->
    <div class="w-full max-w-xs flex flex-col gap-3">
      <button id="btn-camera"
        class="group w-full p-4 rounded-2xl bg-card border border-zinc-800/80 hover:border-accent/50 hover:bg-card-hover
               transition-all duration-200 flex items-center gap-4 text-left">
        <div class="shrink-0 w-11 h-11 rounded-xl bg-accent/10 flex items-center justify-center group-hover:bg-accent/20 transition-colors">
          <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/>
          </svg>
        </div>
        <div>
          <span class="block text-base font-semibold text-white">Act as Camera</span>
          <span class="block text-xs text-zinc-500 mt-0.5">Stream this device's camera</span>
        </div>
        <svg class="w-4 h-4 text-zinc-600 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </button>

      <button id="btn-viewer"
        class="group w-full p-4 rounded-2xl bg-card border border-zinc-800/80 hover:border-accent/50 hover:bg-card-hover
               transition-all duration-200 flex items-center gap-4 text-left">
        <div class="shrink-0 w-11 h-11 rounded-xl bg-accent/10 flex items-center justify-center group-hover:bg-accent/20 transition-colors">
          <svg class="w-5 h-5 text-accent" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 17.25v1.007a3 3 0 01-.879 2.122L7.5 21h9l-.621-.621A3 3 0 0115 18.257V17.25m6-12V15a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 15V5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25z"/>
          </svg>
        </div>
        <div>
          <span class="block text-base font-semibold text-white">Viewer Dashboard</span>
          <span class="block text-xs text-zinc-500 mt-0.5">Watch a remote camera feed</span>
        </div>
        <svg class="w-4 h-4 text-zinc-600 ml-auto" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5"/>
        </svg>
      </button>
    </div>

    <p class="text-zinc-700 text-[10px] mt-4 tracking-wide">v1.0 &middot; LAN only &middot; end-to-end encrypted</p>
  </div>

  <!-- ======================== CAMERA SCREEN ======================== -->
  <div id="screen-camera" class="hidden flex-col h-full bg-black">
    <!-- Top bar -->
    <div class="shrink-0 flex items-center justify-between px-4 py-2.5">
      <button id="btn-cam-back" class="text-zinc-500 hover:text-white transition-colors text-sm flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
        Back
      </button>
      <div class="flex items-center gap-3">
        <!-- Viewer count -->
        <div id="cam-viewer-count" class="hidden items-center gap-1.5 text-zinc-400 text-xs">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          <span id="cam-viewer-num">0</span>
        </div>
        <!-- Live badge -->
        <div id="cam-live-badge" class="hidden items-center gap-1.5 bg-danger/20 text-danger px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider">
          <span class="w-1.5 h-1.5 rounded-full bg-danger animate-pulse-dot"></span>
          Live
        </div>
      </div>
    </div>

    <!-- Camera preview — fills available space -->
    <div class="flex-1 flex items-center justify-center px-3 pb-2 min-h-0">
      <div id="cam-preview-wrapper" class="hidden video-frame w-full h-full max-w-2xl animate-glow border border-zinc-800/50">
        <video id="cam-preview" autoplay playsinline muted></video>
        <!-- Overlay controls -->
        <div class="video-overlay">
          <div></div>
          <div class="flex justify-end p-2">
            <button id="btn-cam-fullscreen" class="w-9 h-9 rounded-xl bg-black/60 backdrop-blur flex items-center justify-center hover:bg-black/80 transition-colors"
              title="Fullscreen">
              <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div id="cam-setup-msg" class="text-zinc-600 text-sm animate-fade-in">Initializing camera…</div>
    </div>

    <!-- PIN + info bar -->
    <div class="shrink-0 px-4 pb-4 pt-2">
      <div class="bg-card rounded-2xl border border-zinc-800/60 px-5 py-4 flex items-center justify-between gap-4">
        <div>
          <p class="text-zinc-500 text-[10px] uppercase tracking-widest mb-1">Camera PIN</p>
          <p id="cam-pin" class="text-3xl font-mono font-bold tracking-[.25em] text-accent">----</p>
        </div>
        <div class="text-right space-y-1">
          <div class="flex items-center justify-end gap-1.5 text-zinc-500 text-[10px]">
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <span id="cam-uptime" class="timer-mono">00:00</span>
          </div>
          <p class="text-zinc-600 text-[10px]">Enter PIN on viewer to connect</p>
        </div>
      </div>
    </div>
  </div>

  <!-- ======================== VIEWER SCREEN ======================== -->
  <div id="screen-viewer" class="hidden flex-col h-full bg-surface">
    <!-- Top bar -->
    <div class="shrink-0 flex items-center justify-between px-4 py-2.5 border-b border-zinc-800/40">
      <button id="btn-view-back" class="text-zinc-500 hover:text-white transition-colors text-sm flex items-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
        </svg>
        Back
      </button>
      <h2 class="text-xs font-semibold text-zinc-500 uppercase tracking-widest">Viewer</h2>
      <div class="w-12"></div>
    </div>

    <!-- Connection form -->
    <div id="viewer-connect-panel" class="flex flex-col items-center justify-center flex-1 px-6 gap-5 animate-fade-in">
      <div class="w-14 h-14 rounded-2xl bg-accent/10 flex items-center justify-center mb-1">
        <svg class="w-7 h-7 text-accent" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M13.19 8.688a4.5 4.5 0 011.242 7.244l-4.5 4.5a4.5 4.5 0 01-6.364-6.364l1.757-1.757m9.86-2.54a4.5 4.5 0 00-1.242-7.244l-4.5-4.5a4.5 4.5 0 00-6.364 6.364l1.757 1.757"
            transform="translate(1.5, 1.5) scale(0.88)"/>
        </svg>
      </div>
      <p class="text-zinc-400 text-sm text-center">Enter the 4-digit PIN shown<br>on the camera device</p>
      <div class="flex items-center gap-2">
        <span class="text-zinc-600 font-mono text-base font-semibold">CAM-</span>
        <input id="viewer-pin-input" type="text" inputmode="numeric" maxlength="4" pattern="[0-9]*"
          placeholder="0000"
          class="w-32 text-center text-2xl font-mono font-bold tracking-[.3em] bg-card border border-zinc-700/80
                 focus:border-accent focus:ring-1 focus:ring-accent/30 outline-none rounded-xl px-3 py-3 text-white placeholder-zinc-700
                 transition-all duration-200">
      </div>
      <button id="btn-connect"
        class="mt-1 w-full max-w-[12rem] py-3 bg-accent hover:bg-accent2 text-black font-bold rounded-xl
               transition-all duration-200 disabled:opacity-30 disabled:cursor-not-allowed disabled:hover:bg-accent"
        disabled>
        Connect
      </button>
      <p id="viewer-status" class="text-zinc-600 text-xs h-5 text-center"></p>
    </div>

    <!-- Video feed (hidden until connected) — viewport-fitted -->
    <div id="viewer-feed-panel" class="hidden flex-col flex-1 min-h-0 p-3 gap-2">
      <!-- Video frame -->
      <div id="viewer-video-frame" class="video-frame flex-1 min-h-0 border border-zinc-800/50">
        <video id="viewer-video" autoplay playsinline muted></video>
        <!-- Overlay -->
        <div class="video-overlay">
          <!-- Top row -->
          <div class="flex items-center justify-between p-2.5">
            <div id="viewer-live-badge" class="flex items-center gap-1.5 bg-danger/20 text-danger px-2.5 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider backdrop-blur-sm">
              <span class="w-1.5 h-1.5 rounded-full bg-danger animate-pulse-dot"></span>
              Live
            </div>
            <div class="flex items-center gap-1.5">
              <!-- Elapsed time -->
              <div class="flex items-center gap-1 bg-black/60 backdrop-blur-sm text-zinc-300 text-[10px] font-mono px-2 py-1 rounded-full timer-mono">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/>
                </svg>
                <span id="viewer-elapsed">00:00</span>
              </div>
              <!-- Fullscreen -->
              <button id="btn-viewer-fullscreen" class="w-8 h-8 rounded-lg bg-black/60 backdrop-blur-sm flex items-center justify-center hover:bg-black/80 transition-colors"
                title="Fullscreen">
                <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M3.75 3.75v4.5m0-4.5h4.5m-4.5 0L9 9M3.75 20.25v-4.5m0 4.5h4.5m-4.5 0L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9m5.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15"/>
                </svg>
              </button>
            </div>
          </div>
          <!-- Bottom row -->
          <div class="flex justify-center pb-3">
            <button id="btn-disconnect"
              class="px-5 py-2 bg-danger/70 hover:bg-danger text-white text-xs font-semibold rounded-full backdrop-blur-sm transition-colors flex items-center gap-1.5">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
              </svg>
              Disconnect
            </button>
          </div>
        </div>
      </div>
      <!-- Info strip under video -->
      <div id="viewer-info-strip" class="shrink-0 flex items-center justify-between bg-card rounded-xl border border-zinc-800/50 px-4 py-2 text-[10px] text-zinc-500">
        <span id="viewer-resolution">--</span>
        <span id="viewer-fps">--</span>
        <span class="text-success font-semibold uppercase tracking-wider">Connected</span>
      </div>
    </div>
  </div>

  <!-- App logic -->
  <script src="app.js"></script>
</body>
</html>
